name: Lint

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'vite.config.ts'
      - '.github/workflows/lint.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'vite.config.ts'
      - '.github/workflows/lint.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Run check
        run: vp check
