name: Browser Tests

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'vitest-example/**'
      - 'vitest.browser.config.ts'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/browser-tests.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'vitest-example/**'
      - 'vitest.browser.config.ts'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/browser-tests.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install Playwright browsers
        run: vp dlx playwright install --with-deps chromium-headless-shell

      - name: Run browser tests
        run: vp test --config=vitest.browser.config.ts
